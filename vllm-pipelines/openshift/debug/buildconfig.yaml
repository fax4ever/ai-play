# Layers an editable install of your local checkout (source of truth for
# Python edits) plus pytest on top of the already-built base image. No
# compilation -- just a COPY, a precompiled-wheel download, and an editable
# install/metadata build -- so this should still only take a couple of
# minutes, not the base image's tens of minutes.
#
# Source is always fed at build time with (see README step 5 for the full
# --exclude flag, which keeps a local .venv/dist out of the upload):
#   oc start-build vllm-fax4ever-patched --from-dir=/home/fax/code/vllm --follow
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: vllm-fax4ever-patched
  namespace: vllm-pipelines
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfile: |
        FROM image-registry.openshift-image-registry.svc:5000/vllm-pipelines/vllm-fax4ever:latest
        WORKDIR /workspace/vllm-src
        COPY . .
        # A real editable install -- vLLM's own documented Python-only dev
        # workflow (see "Set up using Python-only build" in vLLM's install
        # docs) -- instead of raw-copying files over the wheel-installed
        # package. `vllm` now genuinely points at this source tree, so pip's
        # own metadata (RECORD/dist-info) stays consistent, unlike silently
        # overwriting files underneath an unrelated wheel install.
        # --no-deps skips re-resolving dependencies the base image already
        # has installed. --force-reinstall makes the uninstall-old/install-new
        # reconciliation against the existing wheel-installed vllm explicit,
        # rather than relying on implicit "installing from a local path always
        # reinstalls" behavior. Same pinned commit as the main build (step 3)
        # so the downloaded precompiled wheel matches exactly.
        RUN --mount=type=cache,target=/opt/uv/cache \
            VLLM_USE_PRECOMPILED=1 \
            VLLM_PRECOMPILED_WHEEL_COMMIT=e55cc59e52791fe7620f6808e409edcf68740b6b \
            uv pip install --system --no-build-isolation --no-deps --force-reinstall --editable .
        RUN pip install pytest
  output:
    to:
      kind: ImageStreamTag
      name: "vllm-fax4ever-patched:latest"
  resources:
    requests: { cpu: "1", memory: 2Gi }
    limits: { cpu: "2", memory: 4Gi }
  completionDeadlineSeconds: 600
