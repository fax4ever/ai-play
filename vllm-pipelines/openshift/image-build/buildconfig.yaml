apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: vllm-fax4ever
  namespace: vllm-pipelines
spec:
  source:
    type: Git
    git:
      uri: https://github.com/fax4ever/vllm.git
      ref: main
    contextDir: "."
    # This is the real, traceable serving artifact -- always built from
    # committed + pushed git state, never from local uncommitted changes.
    # For testing local edits, see openshift/debug/ instead.
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: docker/Dockerfile
      buildArgs:
        # We keep changes scoped to pure-Python/CuTe-DSL code (see
        # openshift/debug/pod.yaml for that workflow), so we never need to
        # compile the C++/CUDA extensions ourselves -- download vLLM's
        # official precompiled wheel instead. Turns a 1-4h build into a few
        # minutes.
        - name: VLLM_USE_PRECOMPILED
          value: "1"
        # Auto-detecting the merge-base commit grabs the literal latest
        # commit on upstream main, which is usually a few minutes ahead of
        # nightly wheel publishing and 404s. Pin our fork's actual current
        # main HEAD instead (zero ABI drift) -- must be a full 40-char SHA
        # and needs a published wheel; re-check/update after rebasing:
        #   curl -s https://api.github.com/repos/fax4ever/vllm/commits/main \
        #     | python3 -c "import json,sys; print(json.load(sys.stdin)['sha'])"
        #   curl -s -o /dev/null -w "%{http_code}" \
        #     https://wheels.vllm.ai/<sha>/cu130/vllm/metadata.json
        # NOTE: the Dockerfile's declared ARG name is VLLM_MERGE_BASE_COMMIT,
        # not VLLM_PRECOMPILED_WHEEL_COMMIT (that's the env var name it gets
        # exported as internally) -- build-args that don't match a declared
        # ARG are silently dropped, which is why our first attempt at this
        # had no effect.
        - name: VLLM_MERGE_BASE_COMMIT
          value: "e55cc59e52791fe7620f6808e409edcf68740b6b"
        - name: vllm_target_device
          value: "cuda"
  output:
    to:
      kind: ImageStreamTag
      name: "vllm-fax4ever:latest"
  resources:
    requests:
      cpu: "8"
      memory: "16Gi"
    limits:
      cpu: "12"
      memory: "24Gi"
  # Even with VLLM_USE_PRECOMPILED=1, the full multi-stage build (DeepEP
  # compile, Rust tokenizer bindings, final image assembly across ~9 stages)
  # regularly runs past 30 minutes. OpenShift enforces this as the build
  # pod's activeDeadlineSeconds, so exceeding it kills the pod outright
  # (shows up as "DeadlineExceeded" / buildah's "received unexpected
  # terminate signal"), independent of build progress -- so we generously
  # go back to the original 4h ceiling rather than risk killing a slow but
  # otherwise-healthy build.
  completionDeadlineSeconds: 14400
